<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar Asistencia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top left, rgba(255,105,180,0.18), transparent 35%),
                  radial-gradient(circle at bottom right, rgba(65,105,225,0.18), transparent 35%),
                  #ffffff;
      overflow: hidden;
      padding: 20px;
      position: relative;
    }

    .neon-line {
      position: absolute;
      width: 120%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff69b4, #4169e1, transparent);
      box-shadow: 0 0 12px #ff69b4, 0 0 20px #4169e1;
      animation: moveLine 6s linear infinite;
    }

    .neon-line.top { top: 15%; }
    .neon-line.bottom { bottom: 15%; }

    @keyframes moveLine {
      from { transform: translateX(-10%); }
      to { transform: translateX(10%); }
    }

    .glow-pink, .glow-blue {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
    }

    .glow-pink {
      background: rgba(255,105,180,0.22);
      top: 8%;
      left: 8%;
    }

    .glow-blue {
      background: rgba(65,105,225,0.22);
      bottom: 8%;
      right: 8%;
    }

    .form-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(65,105,225,0.18);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 40px;
      box-shadow:
        0 0 20px rgba(255,105,180,0.20),
        0 0 30px rgba(65,105,225,0.18),
        0 10px 40px rgba(65,105,225,0.12);
      text-align: center;
      color: #1e3a8a;
    }

    h1 {
      font-size: 2.3rem;
      margin-bottom: 14px;
      color: #4169e1;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow:
        0 0 6px #ffffff,
        0 0 12px #ff69b4,
        0 0 18px #4169e1;
    }

    p {
      color: #4b5563;
      margin-bottom: 28px;
      font-size: 1rem;
      text-shadow: 0 0 8px rgba(65,105,225,0.08);
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #4169e1;
      font-weight: bold;
      text-shadow: 0 0 6px rgba(255,105,180,0.25);
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(65,105,225,0.18);
      background: rgba(255,255,255,0.95);
      color: #1e3a8a;
      font-size: 1rem;
      outline: none;
      box-shadow: inset 0 0 8px rgba(65,105,225,0.05);
    }

    input::placeholder {
      color: rgba(65,105,225,0.45);
    }

    input:focus {
      border-color: #ff69b4;
      box-shadow:
        0 0 10px rgba(255,105,180,0.35),
        0 0 14px rgba(65,105,225,0.25);
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(90deg, #ff69b4, #4169e1, #87cefa);
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow:
        0 0 14px rgba(255,105,180,0.35),
        0 0 20px rgba(65,105,225,0.30);
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.04);
      box-shadow:
        0 0 20px rgba(255,105,180,0.55),
        0 0 28px rgba(65,105,225,0.45);
    }

    .whatsapp-icon {
      margin-right: 8px;
    }

    @media (max-width: 480px) {
      .form-container {
        padding: 28px;
      }

      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="glow-pink"></div>
  <div class="glow-blue"></div>
  <div class="neon-line top"></div>
  <div class="neon-line bottom"></div>

  <div class="form-container">
    <h1>Confirma tu asistencia</h1>
    <p>Completa tus datos y asegura tu lugar.</p>

    <form id="asistenciaForm">
      <div class="input-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Escribe tu nombre" required>
      </div>

      <div class="input-group">
        <label for="acompanantes">Acompañantes</label>
        <input type="number" id="acompanantes" placeholder="0" min="0" required>
      </div>

      <button type="submit" class="btn">
        <span class="whatsapp-icon">📲</span>Enviar por WhatsApp
      </button>
    </form>
  </div>

  <script>
    document.getElementById('asistenciaForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const nombre = document.getElementById('nombre').value.trim();
      const acompanantes = document.getElementById('acompanantes').value.trim();
      const telefono = '5215543461779';

      const mensaje = `Hola, confirmo mi asistencia.%0A👤 Nombre: ${encodeURIComponent(nombre)}%0A🎟️ Acompañantes: ${encodeURIComponent(acompanantes)}`;
      const enlace = `https://wa.me/${telefono}?text=${mensaje}`;

      window.open(enlace, '_blank');
    });
  </script>
</body>
</html>
